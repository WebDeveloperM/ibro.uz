{% load static %}
<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ seo.title|default:"Ibroo.uz | O'zbekcha imlo va izohli lug'at" }}</title>
    <meta name="description" content="{{ seo.description|default:"Ibroo.uz (ibro.uz) orqali o'zbek tilidagi so'zlarning imlosi, ma'nosi va talaffuzini toping." }}">
    <meta name="robots" content="{{ seo.robots|default:'index,follow' }}">
    <meta name="keywords" content="{{ seo.keywords|default:"o'zbekcha lug'at, o'zbek so'zlari, imlo, so'z ma'nosi, ibroo.uz, ibro.uz, o'zbek tili lug'ati" }}">
    <link rel="canonical" href="{{ seo.canonical_url|default:request.build_absolute_uri }}">
    <link rel="alternate" hreflang="uz" href="{{ seo.canonical_url|default:request.build_absolute_uri }}">
    <link rel="alternate" hreflang="x-default" href="{{ seo.canonical_url|default:request.build_absolute_uri }}">
    <meta property="og:locale" content="uz_UZ">
    <meta property="og:type" content="{{ seo.og_type|default:'website' }}">
    <meta property="og:site_name" content="Ibroo.uz">
    <meta property="og:title" content="{{ seo.title|default:"Ibroo.uz | O'zbekcha imlo va izohli lug'at" }}">
    <meta property="og:description" content="{{ seo.description|default:"Ibroo.uz (ibro.uz) orqali o'zbek tilidagi so'zlarning imlosi, ma'nosi va talaffuzini toping." }}">
    <meta property="og:url" content="{{ seo.canonical_url|default:request.build_absolute_uri }}">
    <meta property="og:image" content="{{ seo.image_url }}">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ seo.title|default:"Ibroo.uz | O'zbekcha imlo va izohli lug'at" }}">
    <meta name="twitter:description" content="{{ seo.description|default:"Ibroo.uz (ibro.uz) orqali o'zbek tilidagi so'zlarning imlosi, ma'nosi va talaffuzini toping." }}">
    <meta name="twitter:image" content="{{ seo.image_url }}">
    <link rel="stylesheet" href="{% static 'dictionary/css/style.css' %}">
    {% if seo.structured_data_json %}
    <script type="application/ld+json">{{ seo.structured_data_json|safe }}</script>
    {% endif %}
</head>

<body>
    <header>
        <nav class="container">
            <div class="site-logo">
                <a href="/"> <img src="{% static 'images/logo.png' %}" alt="Ibroo.uz - O'zbekcha imlo va izohli lug'at" width="200"></a>
            </div>
            <ul>
                <li><a style="font-size: large;" href="/">Bosh sahifa</a></li>
                <li><a style="font-size: large;" href="/admin/">Admin</a></li>
            </ul>
        </nav>
    </header>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer class="site-footer">
        <p>&copy; 2026 Ibroo.uz - O'zbek tiling izohli lug'ati asosida tuzilgan Lingvomadaniy lug'at.</p>
    </footer>

    <script>
        // Real-time search functionality
        document.addEventListener('DOMContentLoaded', function () {
            const searchInput = document.getElementById('search-input');
            const searchResults = document.getElementById('search-results');
            const resultsList = document.getElementById('results-list');
            let searchTimeout;

            if (searchInput) {
                searchInput.addEventListener('input', function () {
                    const query = this.value.trim();

                    // Clear previous timeout
                    clearTimeout(searchTimeout);

                    if (query.length < 2) {
                        searchResults.style.display = 'none';
                        return;
                    }

                    // Debounce search requests
                    searchTimeout = setTimeout(() => {
                        performSearch(query);
                    }, 300);
                });

                // Hide results when clicking outside
                document.addEventListener('click', function (e) {
                    if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
                        searchResults.style.display = 'none';
                    }
                });
            }

            function performSearch(query) {
                fetch(`/search/?q=${encodeURIComponent(query)}`, {
                    headers: {
                        'X-Requested-With': 'XMLHttpRequest'
                    }
                })
                    .then(response => response.json())
                    .then(data => {
                        displayResults(data.results, query);
                    })
                    .catch(error => {
                        console.error('Search error:', error);
                    });
            }

            function displayResults(results, query) {
                if (results.length === 0) {
                    resultsList.innerHTML = '<div class="no-results">Hech narsa topilmadi</div>';
                    searchResults.style.display = 'block';
                    return;
                }

                let html = '';
                results.forEach(result => {
                    // Highlight matching text
                    const highlightedWord = highlightMatch(result.word, query);
                    const highlightedDef = highlightMatch(result.definition, query);

                    html += `
                        <div class="result-item">
                            <a href="${result.url}" class="result-link">
                                <div class="result-word">${highlightedWord}</div>
                                <div class="result-definition">${highlightedDef}</div>
                                <div class="result-meta">${result.letter_count} ta harf</div>
                            </a>
                        </div>
                    `;
                });

                resultsList.innerHTML = html;
                searchResults.style.display = 'block';
            }

            function highlightMatch(text, query) {
                if (!query) return text;
                const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const regex = new RegExp(`(${escaped})`, 'gi');
                return text.replace(regex, '<mark>$1</mark>');
            }
        });
    </script>
</body>

</html>
